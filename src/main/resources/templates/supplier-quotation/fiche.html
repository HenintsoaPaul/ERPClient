<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPClient - Quotations List</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }

        h1 {
            margin-bottom: 30px;
            color: #0d6efd;
        }

        h2 {
            margin: 25px 0 15px;
            color: #0d6efd;
        }

        table {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .table-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .edit-rate-btn {
            cursor: pointer;
            color: #0d6efd;
        }

        .edit-rate-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        Quotations From '<span th:text="${sq.supplierName}"></span>'
    </h1>

    <!-- General Quotation Info -->
    <div class="table-container">
        <table class="table table-striped table-hover">
            <thead class="table-primary">
            <tr>
                <th>#</th>
                <th>Supplier</th>
                <th>Status</th>
                <th>Transaction Date</th>
                <th>Valid Till</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${sq.name}"></td>
                <td th:text="${sq.supplierName}"></td>
                <td th:text="${sq.status}"></td>
                <td th:text="${sq.transactionDate}"></td>
                <td th:text="${sq.validTill}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Items Table -->
    <div class="table-container">
        <h2>Items</h2>
        <table class="table table-striped table-hover">
            <thead class="table-primary">
            <tr>
                <th>#</th>
                <th>Item Code</th>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Uom</th>
                <th>Rate</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item,iterStat : ${items}">
                <td th:text="${item.name}"></td>
                <td th:text="${item.itemCode}"></td>
                <td th:text="${item.itemName}"></td>
                <td th:text="${item.qty}"></td>
                <td th:text="${item.uom}"></td>
                <td class="item-rate" th:text="${item.rate}"></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary edit-rate-btn"
                            th:data-item-id="${item.name}"
                            th:data-item-code="${item.itemCode}"
                            th:data-current-rate="${item.rate}"
                            th:data-current-qty="${item.qty}"
                            th:data-row-index="${iterStat.index}">
                        Edit Rate
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Edit Rate Modal -->
<div class="modal fade" id="editRateModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Item Rate</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="rateForm">
                    <div class="mb-3">
                        <label for="itemCode" class="form-label">Item Code</label>
                        <input type="text" class="form-control" id="itemCode" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="newRate" class="form-label">New Rate</label>
                        <input type="number" step="0.01" class="form-control" id="newRate" required>
                    </div>
                    <div class="mb-3">
                        <label for="newQty" class="form-label">New Qty</label>
                        <input type="number" step="1" class="form-control" id="newQty" required>
                    </div>
                    <input type="hidden" id="rowIndex">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveRateBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function () {
        // Initialize modal
        const editRateModal = new bootstrap.Modal(document.getElementById('editRateModal'), {focus: true});

        // Handle edit button click
        $('.edit-rate-btn').click(function () {
            let itemCode = $(this).data('item-code');
            let currentRate = $(this).data('current-rate');
            let currentQty = $(this).data('current-qty');
            let rowIndex = $(this).data('row-index');

            console.log(itemCode)

            $('#itemCode').val(itemCode);
            $('#newRate').val(currentRate);
            $('#newQty').val(currentQty);
            $('#rowIndex').val(rowIndex);

            editRateModal.show();
        });

        // Handle save button click
        $('#saveRateBtn').click(function () {
            const newRate = $('#newRate').val();
            const newQty = $('#newQty').val();
            const rowIndex = $('#rowIndex').val();

            if (newRate && newRate > 0) {
                // Here you would typically make an AJAX call to update the rate in your backend
                $.ajax({
                    url: '/supplier-quotations/update-item-rate',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        itemId: $('#itemId').val(),
                        newRate: newRate,
                        newQty: newQty
                    }),
                    success: function(response) {
                        // Handle success
                        editRateModal.hide();
                    },
                    error: function(xhr) {
                        // Handle error
                        alert('Error updating rate');
                    }
                });

                // Update the table display
                $($('.item-rate')[rowIndex]).text(newRate);
                $()


                // For now, just close the modal
                editRateModal.hide();
            } else {
                alert('Please enter a valid rate');
            }
        });
    });
</script>
</body>
</html>
