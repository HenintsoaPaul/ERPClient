<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ERPClient - Supplier Quotations List</title>
</head>
<body>
<h1>Supplier Quotations List of a <!***!></h1>

<!--general-->
<div>
    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Supplier</th>
            <th>Status</th>
            <th>Transaction Date</th>
            <th>Valid Till</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="sq : ${supplierQuotations}">
            <td th:text="${sq.name}"></td>
            <td th:text="${sq.supplierName}"></td>
            <td th:text="${sq.status}"></td>
            <td th:text="${sq.transactionDate}"></td>
            <td th:text="${sq.validTill}"></td>
            <td>
                <a th:href="'/supplier-quotations/fiche?name=' + ${sq.name} + '&sp_name=' + ${sq.supplierName}">
                    Detail
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
