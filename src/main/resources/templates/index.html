<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ERPClient - Login</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #login-container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        #login-container h3 {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        button[type="submit"] {
            width: 100%;
        }
    </style>
</head>
<body>

<div id="login-container">
    <h3>ERP Login</h3>

    <!-- Display success or error messages -->
    <div th:if="${msg}" class="alert alert-success" role="alert" th:text="${msg}"></div>
    <div th:if="${err}" class="alert alert-danger" role="alert" th:text="${err}"></div>

    <form action="/login" method="post">
        <div class="mb-3">
            <label for="usr" class="form-label">Username</label>
            <input id="usr" type="text" name="inp-usr" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="pwd" class="form-label">Password</label>
            <input id="pwd" type="password" name="inp-pwd" class="form-control" required>
        </div>
        <div>
            <button type="submit" class="btn btn-primary">Login</button>
        </div>
    </form>
</div>

<!-- Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
