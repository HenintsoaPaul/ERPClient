<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPClient - Purchase Invoice Detail</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>
<body>

<header th:include="fragments/navbar"></header>

<main class="container">
    <h1 class="my-4">
        <span th:text="${po.name}"></span> - Purchase Invoice Detail
    </h1>

    <!-- General Quotation Info -->
    <div class="table-container">
        <h2>General Information</h2>

        <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Supplier</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${po.name}"></td>
                <td th:text="${po.supplierName}"></td>
                <td th:text="${po.status}"></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary edit-rate-btn"
                            th:data-pinvoice-name="${po.name}">
                        Pay This
                    </button>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Payment Info -->
        <div>
            <h4>Payment information</h4>

            <table class="table table-bordered table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Total Amount</th>
                    <th>Outstanding Amount</th>
                    <th>Allocated Amount</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td th:text="${po.grandTotal}"></td>
                    <td th:text="${po.outstandingAmount}"></td>
                    <td th:text="${po.allocatedAmount}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Temporal Info -->
        <div>
            <h4>Temporal information</h4>

            <table class="table table-bordered table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Posting Date</th>
                    <th>Posting Time</th>
                    <th>Due Date</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td th:text="${po.postingDate}"></td>
                    <td th:text="${po.postingTime}"></td>
                    <td th:text="${po.dueDate}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Items Table -->
    <div class="table-container">
        <h2>Items</h2>
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>Item Code</th>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Rate</th>
                <th>Amount</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item,iterStat : ${items}">
                <td th:text="${item.itemCode}"></td>
                <td th:text="${item.itemName}"></td>
                <td th:text="${item.qty}"></td>
                <td th:text="${item.rate}"></td>
                <td class="item-rate" th:text="${item.amount}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Edit Rate Modal -->
<div class="modal fade" id="editRateModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">New Payment Entry</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="rateForm">
                    <div class="mb-3">
                        <label for="postingDate" class="form-label">Posting date</label>
                        <input type="date" class="form-control" id="postingDate" required>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount</label>
                        <input type="number" step="0.01" class="form-control" id="amount" required>
                    </div>
                    <div class="mb-3">
                        <label for="payment-method" class="form-label">Payment Method</label>
                        <input type="text" class="form-control" id="payment-method" value="Cash" readonly>
                    </div>
                    <input type="hidden" id="rowIndex">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveRateBtn">Submit Payment</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function () {
        // Initialize modal
        const editRateModal = new bootstrap.Modal(document.getElementById('editRateModal'), {focus: true});

        const editRateBtn = $('.edit-rate-btn');

        // Handle edit button click
        editRateBtn.click(function () {
            editRateModal.show();
        });

        // Handle save button click
        $('#saveRateBtn').click(function () {
            const purchaseInvoiceId = editRateBtn.data('pinvoice-name');
            const amount = $('#amount').val();
            const postingDate = $('#postingDate').val();

            console.log(purchaseInvoiceId, amount, postingDate)

            if (!amount || amount <= 0) {
                console.log(amount)

                alert('Please enter a valid rate');
                return;
            }

            if (!postingDate) {
                console.log(postingDate);
                
                alert('Please enter a posting date');
                return;
            }

            // Here you would typically make an AJAX call to update the rate in your backend
            $.ajax({
                url: '/purchase-invoices/add-payment',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    purchaseInvoiceId: purchaseInvoiceId,
                    postingDate: postingDate,
                    amount: amount,
                }),
                success: function (response) {
                    // Handle success
                    editRateModal.hide();
                },
                error: function (xhr) {
                    // Handle error
                    alert('Error during payment');
                }
            });

            // // Update the table display
            // $(
            //     $('.item-rate')[rowIndex]
            // ).text(amount);


            // For now, just close the modal
            editRateModal.hide();
        });
    });
</script>
</body>
</html>
