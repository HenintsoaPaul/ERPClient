<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ERPClient - Purchase Invoices List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>
<body>

<header th:include="fragments/navbar"></header>

<main class="container">
    <h1 class="my-4">Purchase Invoices List</h1>
    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Supplier</th>
                <th>Status</th>
                <th>Posting Date</th>
                <th>Posting Time</th>
                <th>Due Date</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pi : ${purchaseInvoices}">
                <td th:text="${pi.name}"></td>
                <td th:text="${pi.supplierName}"></td>
                <td th:text="${pi.status}"></td>
                <td th:text="${pi.postingDate}"></td>
                <td th:text="${pi.postingTime}"></td>
                <td th:text="${pi.dueDate}"></td>
                <td>
                    <a class="btn btn-sm btn-info"  th:href="'/purchase-invoices/fiche?name=' + ${pi.name} + '&sp_name=' + ${pi.supplierName}">
                        Details
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
