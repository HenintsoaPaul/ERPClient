<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPClient - Quotations List</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }

        h1 {
            margin-bottom: 30px;
            color: #0d6efd;
        }

        h2 {
            margin: 25px 0 15px;
            color: #0d6efd;
        }

        table {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .table-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .edit-rate-btn {
            cursor: pointer;
            color: #0d6efd;
        }

        .edit-rate-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        Purchase Orders from '<span th:text="${po.supplierName}"></span>'
    </h1>

    <!-- General Quotation Info -->
    <div class="table-container">
        <table class="table table-striped table-hover">
            <thead class="table-primary">
            <tr>
                <th>#</th>
                <th>Supplier</th>
                <th>Status</th>
                <th>Transaction Date</th>
                <th>Required By</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${po.name}"></td>
                <td th:text="${po.supplierName}"></td>
                <td th:text="${po.status}"></td>
                <td th:text="${po.transactionDate}"></td>
                <td th:text="${po.scheduleDate}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Items Table -->
    <div class="table-container">
        <h2>Items</h2>
        <table class="table table-striped table-hover">
            <thead class="table-primary">
            <tr>
                <th>Item Code</th>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Uom</th>
                <th>Rate</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item,iterStat : ${items}">
                <td th:text="${item.itemCode}"></td>
                <td th:text="${item.itemName}"></td>
                <td th:text="${item.qty}"></td>
                <td th:text="${item.uom}"></td>
                <td class="item-rate" th:text="${item.rate}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Bootstrap JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
