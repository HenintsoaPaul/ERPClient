<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ERPClient - Purchase Orders List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>
<body>

<header th:include="fragments/navbar"></header>

<main class="container">
    <h1 class="my-4">Purchase Orders List</h1>
    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Supplier</th>
                <th>Status</th>
                <th>Transaction Date</th>
                <th>Required By</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="po : ${purchaseOrders}">
                <td th:text="${po.name}"></td>
                <td th:text="${po.supplierName}"></td>
                <td th:text="${po.status}"></td>
                <td th:text="${po.transactionDate}"></td>
                <td th:text="${po.scheduleDate}"></td>
                <td>
                    <a class="btn btn-sm btn-info" th:href="'/purchase-orders/fiche?name=' + ${po.name} + '&sp_name=' + ${po.supplierName}">
                        Details
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
